<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CROSSOVER</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI', Arial;
    transition:0.3s;
}

/* THEMES */
.light { background:#f5f7fb; color:#111; }
.dark { background:#0f172a; color:#fff; }
.pink { background:#ffe4ec; color:#c2185b; }
.halloween { background:#111; color:orange; }
.forest { background:#e8f5e9; color:#1b5e20; }
.gold { background:#fff8dc; color:#b8860b; }

.container {
    padding:30px;
    text-align:center;
}

/* TITLE */
h1 {
    font-size:50px;
    font-weight:900;
}

h4 {
    opacity:0.6;
}

/* INPUT */
input, select {
    padding:12px;
    margin:8px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* BUTTON */
button {
    padding:12px 18px;
    margin:8px;
    border:none;
    border-radius:12px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    transform:scale(1.05);
    background:#4338ca;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:center;
    gap:30px;
    padding:20px;
}

.navbar button {
    background:transparent;
    color:inherit;
    font-weight:600;
}

/* VIDEO */
.video-container {
    display:flex;
    gap:20px;
    margin-top:20px;
}

.video-box {
    width:45%;
    height:320px;
    background:black;
    border-radius:15px;
}

/* CHAT */
.chat-box {
    height:200px;
    border-radius:10px;
    padding:10px;
    background:rgba(0,0,0,0.05);
    overflow:auto;
}

/* TAG */
.tag {
    display:inline-block;
    background:#4f46e5;
    color:white;
    padding:6px 10px;
    border-radius:20px;
    margin:5px;
}

/* COUNTRY */
.country-list {
    height:250px;
    overflow:auto;
    border-radius:10px;
    background:white;
    padding:10px;
}

/* CARD */
.card {
    background:white;
    padding:20px;
    border-radius:15px;
    width:300px;
    margin:15px auto;
}

/* ANIMATION */
.fade {
    animation:fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

.hidden { display:none; }

</style>
</head>

<body class="light">

<!-- LOGIN -->
<div id="login" class="container fade">
<h1>CROSSOVER</h1>
<h4>Safe & Global Connection</h4>

<select>
<option>🇬🇧 English</option>
<option>🇪🇸 Español</option>
<option>🇫🇷 Français</option>
<option>🇩🇪 Deutsch</option>
<option selected>🇮🇹 Italiano</option>
<option>🇵🇹 Português</option>
<option>🇸🇦 عربي</option>
</select>

<br>

<input id="username" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>

<select>
<option>Choose gender</option>
<option>Male</option>
<option>Female</option>
</select>

<p style="color:red;">⚠ Gender cannot be changed later</p>

<button onclick="setAge(true)">I am over 18</button>
<button onclick="setAge(false)">I am under 18</button>

<p id="ageMsg" style="color:red;"></p>

</div>

<!-- INTEREST -->
<div id="interest" class="container hidden">

<div class="card fade">
<h2>Customise your Match</h2>

<input id="interestInput" placeholder="Enter interests">
<button onclick="addTag()">Add</button>

<div id="tags"></div>
</div>

<div class="card fade">
<h2>Select a Mode</h2>

<button onclick="start('video')">Video + Chat</button>
<button onclick="start('chat')">Chat Only</button>
</div>

</div>

<!-- HOME -->
<div id="home" class="hidden">

<div class="navbar">
<button onclick="go('home')">HOME</button>
<button onclick="go('friend')">FRIEND</button>
<button onclick="go('settings')">SETTINGS</button>
</div>

<div class="container fade">

<div class="video-container" id="videos">
<div class="video-box"></div>
<div class="video-box"></div>
</div>

<br>

<button onclick="animateClick(this); stop()">STOP</button>
<button onclick="animateClick(this); next()">NEXT STRANGER</button>
<button onclick="animateClick(this); addFriend()">ADD FRIEND</button>
<button onclick="report()">REPORT USER</button>

<br>

<select>
<option>Looking for: Everyone</option>
<option>Male</option>
<option>Female</option>
</select>

<button onclick="toggleCountries()">🌎</button>

<div id="countries" class="country-list hidden"></div>

<div class="chat-box" id="chat"></div>
<input id="msg">
<button onclick="send()">Send</button>

</div>
</div>

<!-- FRIEND -->
<div id="friend" class="hidden container">
<button onclick="go('home')">⬅ Back</button>
<h2>Friends</h2>
<div id="friendList"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="hidden container">
<button onclick="go('home')">⬅ Back</button>
<h2>Settings</h2>

<button onclick="showProfile()">Profile</button>
<button onclick="showBlocked()">Blocked Users</button>
<button onclick="showThemes()">Themes</button>
<button onclick="logout()">Sign Out</button>

<div id="settingsContent"></div>
</div>

<script>

let friends = [];
let blocked = [];

function setAge(val){
    if(!val){
        document.getElementById("ageMsg").innerText =
        "You must be 18+ to continue";
    } else {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("interest").classList.remove("hidden");
    }
}

function addTag(){
    let val = document.getElementById("interestInput").value;
    if(val === "") return;
    let tag = document.createElement("span");
    tag.className = "tag";
    tag.innerText = val;
    document.getElementById("tags").appendChild(tag);
}

function start(mode){
    document.getElementById("interest").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");

    if(mode === "chat"){
        document.getElementById("videos").style.display = "none";
    }
}

function go(page){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("friend").classList.add("hidden");
    document.getElementById("settings").classList.add("hidden");

    document.getElementById(page).classList.remove("hidden");
}

function send(){
    let msg = document.getElementById("msg").value;
    if(msg==="") return;
    let div = document.createElement("div");
    div.innerText = msg;
    document.getElementById("chat").appendChild(div);
}

function addFriend(){
    let name = document.getElementById("username").value || "User";
    friends.push(name);
    updateFriends();
}

function updateFriends(){
    let list = document.getElementById("friendList");
    list.innerHTML = "";
    friends.forEach(f=>{
        let d = document.createElement("div");
        d.innerText = f;
        list.appendChild(d);
    });
}

function report(){
    alert("User reported. Access blocked until tomorrow.");
}

function toggleCountries(){
    let c = document.getElementById("countries");
    c.classList.toggle("hidden");

    if(c.innerHTML === ""){
        let list = ["Argentina 🇦🇷","Australia 🇦🇺","Brazil 🇧🇷","Canada 🇨🇦","France 🇫🇷","Germany 🇩🇪","Italy 🇮🇹","Japan 🇯🇵","Spain 🇪🇸","United States 🇺🇸"];
        list.sort().forEach(country=>{
            let d = document.createElement("div");
            d.innerText = country;
            c.appendChild(d);
        });
    }
}

function showProfile(){
    document.getElementById("settingsContent").innerHTML =
    "Edit username and profile picture";
}

function showBlocked(){
    document.getElementById("settingsContent").innerHTML =
    "Blocked: " + blocked.join(",");
}

function showThemes(){
    document.getElementById("settingsContent").innerHTML = `
    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('pink')">Pink</button>
    <button onclick="setTheme('halloween')">Halloween</button>
    <button onclick="setTheme('forest')">Forest</button>
    <button onclick="setTheme('gold')">Gold</button>
    `;
}

function setTheme(t){
    document.body.className = t;
}

function logout(){
    location.reload();
}

function stop(){ alert("Connection stopped"); }
function next(){ alert("Finding new user..."); }

function animateClick(el){
    el.style.transform = "scale(0.95)";
    setTimeout(()=> el.style.transform="scale(1)",100);
}

</script>

</body>
</html>
