<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>CROSSOVER</title>
<style>

body {
    margin:0;
    font-family: Arial;
}

/* THEMES */
.light { background:#fff; color:#111; }
.dark { background:#111; color:#fff; }
.pink { background:#ffd6e7; color:#c2185b; }
.halloween { background:#111; color:orange; }
.forest { background:#d0f0c0; color:#1b5e20; }
.gold { background:#fff8dc; color:#b8860b; }

.container { padding:20px; text-align:center; }

input, button, select {
    padding:10px;
    margin:5px;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
    border-bottom:1px solid gray;
}

.navbar button {
    font-weight:bold;
}

/* VIDEO BOX */
.video-container {
    display:flex;
    justify-content:center;
    gap:20px;
}

.video-box {
    width:300px;
    height:200px;
    background:#000;
}

/* CHAT */
.chat-box {
    border:1px solid gray;
    height:200px;
    overflow:auto;
    margin-top:10px;
}

.hidden { display:none; }

/* TAGS */
.tag {
    display:inline-block;
    background:#ccc;
    padding:5px;
    margin:3px;
    border-radius:5px;
}

/* COUNTRY MENU */
.country-list {
    height:200px;
    overflow:auto;
    border:1px solid gray;
}

</style>
</head>
<body class="light">

<!-- LOGIN -->
<div id="login" class="container">
    <h1>CROSSOVER</h1>
    <h4>Safe & Global Connection</h4>

    <select id="language">
        <option>🇬🇧 English</option>
        <option>🇪🇸 Español</option>
        <option>🇫🇷 Français</option>
        <option>🇩🇪 Deutsch</option>
        <option selected>🇮🇹 Italiano</option>
        <option>🇵🇹 Português</option>
        <option>🇸🇦 عربي</option>
    </select>

    <br>

    <input id="username" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>

    <select id="gender">
        <option value="">Seleziona genere</option>
        <option>Maschio</option>
        <option>Femmina</option>
    </select>

    <p style="color:red;">⚠ Il genere NON potrà essere cambiato</p>

    <br>

    <button onclick="setAge(true)">Ho più di 18 anni</button>
    <button onclick="setAge(false)">Non ho 18 anni</button>

    <p id="ageMsg" style="color:red;"></p>

    <p>
    Safety Declaration <br>
    • No contenuti sessuali <br>
    • Monitoraggio attivo <br>
    • +18 obbligatorio
    </p>
</div>

<!-- INTEREST -->
<div id="interest" class="container hidden">
    <h2>Customise your Match</h2>

    <input id="interestInput" placeholder="Inserisci interesse">
    <button onclick="addTag()">Aggiungi</button>

    <div id="tags"></div>

    <br>

    <button onclick="start('video')">Video + Chat</button>
    <button onclick="start('chat')">Chat Only</button>
</div>

<!-- HOME -->
<div id="home" class="hidden">

<div class="navbar">
    <button onclick="go('home')">HOME</button>
    <button onclick="go('friend')">FRIEND</button>
    <button onclick="go('settings')">SETTINGS</button>
</div>

<div class="container">

<div class="video-container" id="videos">
    <div class="video-box"></div>
    <div class="video-box"></div>
</div>

<button onclick="stop()">STOP</button>
<button onclick="next()">NEXT STRANGER</button>
<button onclick="addFriend()">ADD FRIEND</button>
<button onclick="report()">SEGNALA UTENTE</button>

<br><br>

<select id="looking">
    <option>Entrambi</option>
    <option>Maschi</option>
    <option>Femmine</option>
</select>

<button onclick="toggleCountries()">🌎</button>

<div id="countries" class="country-list hidden"></div>

<div id="chat" class="chat-box"></div>
<input id="msg">
<button onclick="send()">Invia</button>

</div>
</div>

<!-- FRIEND -->
<div id="friend" class="hidden container">
    <h2>Friends</h2>
    <div id="friendList"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="hidden container">

<h2>Settings</h2>

<button onclick="showProfile()">PROFILO</button>
<button onclick="showBlocked()">UTENTI BLOCCATI</button>
<button onclick="showThemes()">THEMES</button>
<button onclick="logout()">SIGN OUT</button>

<div id="settingsContent"></div>

</div>

<script>

let ageOK = false;
let friends = [];
let blocked = [];

function setAge(val){
    if(!val){
        document.getElementById("ageMsg").innerText =
        "Non avendo 18 anni non puoi continuare";
    } else {
        ageOK = true;
        document.getElementById("login").classList.add("hidden");
        document.getElementById("interest").classList.remove("hidden");
    }
}

function addTag(){
    let val = document.getElementById("interestInput").value;
    let tag = document.createElement("span");
    tag.className = "tag";
    tag.innerText = val;
    document.getElementById("tags").appendChild(tag);
}

function start(mode){
    document.getElementById("interest").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");

    if(mode === "chat"){
        document.getElementById("videos").style.display = "none";
    }
}

function go(page){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("friend").classList.add("hidden");
    document.getElementById("settings").classList.add("hidden");

    document.getElementById(page).classList.remove("hidden");
}

function send(){
    let msg = document.getElementById("msg").value;
    let div = document.createElement("div");
    div.innerText = msg;
    document.getElementById("chat").appendChild(div);
}

function addFriend(){
    let name = document.getElementById("username").value;
    friends.push(name);
    updateFriends();
}

function updateFriends(){
    let list = document.getElementById("friendList");
    list.innerHTML = "";
    friends.forEach(f=>{
        let d = document.createElement("div");
        d.innerText = f;
        list.appendChild(d);
    });
}

function report(){
    alert("Utente segnalato. Bloccato fino a domani.");
}

function toggleCountries(){
    let c = document.getElementById("countries");
    c.classList.toggle("hidden");

    if(c.innerHTML === ""){
        let list = ["Albania 🇦🇱","Andorra 🇦🇩","Austria 🇦🇹","Belgio 🇧🇪","Brasile 🇧🇷","Canada 🇨🇦","Cina 🇨🇳","Francia 🇫🇷","Germania 🇩🇪","Italia 🇮🇹","Spagna 🇪🇸","Stati Uniti 🇺🇸"];
        list.sort().forEach(country=>{
            let d = document.createElement("div");
            d.innerText = country;
            c.appendChild(d);
        });
    }
}

function showProfile(){
    document.getElementById("settingsContent").innerHTML =
    "Modifica nome e immagine profilo";
}

function showBlocked(){
    document.getElementById("settingsContent").innerHTML =
    "Utenti bloccati: " + blocked.join(",");
}

function showThemes(){
    document.getElementById("settingsContent").innerHTML = `
    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('pink')">Pink</button>
    <button onclick="setTheme('halloween')">Halloween</button>
    <button onclick="setTheme('forest')">Forest</button>
    <button onclick="setTheme('gold')">Gold</button>
    `;
}

function setTheme(t){
    document.body.className = t;
}

function logout(){
    location.reload();
}

function stop(){ alert("Connessione chiusa"); }
function next(){ alert("Nuovo utente"); }

</script>

</body>
</html>
